<script>
/**
 * CanSTEM Moodle: Student-only paste restrictions + simplified editor UI
 * Works for:
 *  - Assignment Online Text submission pages (student actions)
 *  - Quiz attempt pages (student typing responses, including Essay questions)
 *
 * Students:
 *  - Blocks paste + drag/drop into text fields and TinyMCE
 *  - Hides TinyMCE menubar items (Edit/View/Insert/Tools/Table/Help [+ optional Format])
 *  - Hides common "insert" toolbar buttons (link/image/media/code/record/h5p)
 *
 * Staff:
 *  - Not affected anywhere (even on grading/review/edit pages)
 */

(function () {
  // ---------- Role checks ----------
  function isTeacherOrAdmin() {
    const b = document.body;
    const cls = (b && b.className) ? b.className : "";
    return /role-(editingteacher|teacher|manager|coursecreator|admin|administrator)/i.test(cls);
  }

  function isStudentRole() {
    const b = document.body;
    const cls = (b && b.className) ? b.className : "";
    return /role-student/i.test(cls);
  }

  // ---------- Context checks ----------
  function isStudentRestrictedContext() {
    if (isTeacherOrAdmin()) return false; // NEVER restrict staff

    const url = location.href;

    // --- Assignment submission contexts (student) ---
    const isAssign = /\/mod\/assign\/view\.php/i.test(url);
    const isAssignStudentAction =
      /action=editsubmission/i.test(url) ||
      /action=submit/i.test(url) ||
      /action=view/i.test(url);

    const isAssignGradingAction =
      /action=grading/i.test(url) ||
      /action=grader/i.test(url) ||
      /action=grade/i.test(url) ||
      /action=viewall/i.test(url);

    const assignStudentContext = isAssign && isAssignStudentAction && !isAssignGradingAction;

    // --- Quiz student attempt contexts (where students type answers) ---
    // Typical student attempt pages:
    //  - /mod/quiz/attempt.php
    //  - /mod/quiz/summary.php
    //  - /mod/quiz/review.php  (students can view; sometimes typing is disabled anyway)
    const isQuizAttempt =
      /\/mod\/quiz\/attempt\.php/i.test(url) ||
      /\/mod\/quiz\/summary\.php/i.test(url) ||
      /\/mod\/quiz\/review\.php/i.test(url);

    // Avoid restricting admin/teacher quiz editing pages:
    const isQuizEditOrBank =
      /\/mod\/quiz\/edit\.php/i.test(url) ||
      /\/question\/bank\//i.test(url) ||
      /\/question\/edit\.php/i.test(url);

    const quizStudentContext = isQuizAttempt && !isQuizEditOrBank;

    // If Moodle has role-student, trust it strongly.
    // If role class is missing, use URL context fallback.
    if (isStudentRole()) return assignStudentContext || quizStudentContext;

    // No role info: only enforce on assignment submission or quiz attempt pages
    return assignStudentContext || quizStudentContext;
  }

  if (!isStudentRestrictedContext()) return;

  // ---------- Alert helper ----------
  let lastWarn = 0;
  function warnOnce(msg) {
    const now = Date.now();
    if (now - lastWarn < 1500) return;
    lastWarn = now;
    alert(msg);
  }

  // ---------- 1) Block paste in normal editable areas ----------
  document.addEventListener(
    "paste",
    function (e) {
      const t = e.target;
      if (!t) return;

      const tag = (t.tagName || "").toUpperCase();
      const type = (t.type || "").toLowerCase();

      const isEditable =
        t.isContentEditable === true ||
        tag === "TEXTAREA" ||
        (tag === "INPUT" && (type === "text" || type === "search" || type === "email"));

      if (isEditable) {
        e.preventDefault();
        warnOnce("Pasting is disabled. Please type your own work.");
      }
    },
    true
  );

  // ---------- 2) Also block drop (drag/drop text) on normal areas ----------
  document.addEventListener(
    "drop",
    function (e) {
      const t = e.target;
      if (!t) return;

      const tag = (t.tagName || "").toUpperCase();
      const type = (t.type || "").toLowerCase();

      const isEditable =
        t.isContentEditable === true ||
        tag === "TEXTAREA" ||
        (tag === "INPUT" && (type === "text" || type === "search" || type === "email"));

      if (isEditable) {
        e.preventDefault();
        warnOnce("Drag & drop is disabled. Please type your own work.");
      }
    },
    true
  );

  // ---------- 3) Hide common rich insert toolbar buttons (TinyMCE) ----------
  const style = document.createElement("style");
  style.textContent = `
    /* Hide link/image/media/code/record/h5p toolbar buttons if present */
    .tox .tox-tbtn[aria-label*="link" i],
    .tox .tox-tbtn[title*="link" i],
    .tox .tox-tbtn[aria-label*="image" i],
    .tox .tox-tbtn[title*="image" i],
    .tox .tox-tbtn[aria-label*="media" i],
    .tox .tox-tbtn[title*="media" i],
    .tox .tox-tbtn[aria-label*="code" i],
    .tox .tox-tbtn[title*="code" i],
    .tox .tox-tbtn[aria-label*="record" i],
    .tox .tox-tbtn[title*="record" i],
    .tox .tox-tbtn[aria-label*="h5p" i],
    .tox .tox-tbtn[title*="h5p" i] { display:none !important; }
  `;
  document.head.appendChild(style);

  // ---------- 4) Hide TinyMCE MENUBAR items ----------
  function hideMenubarItems() {
    const buttons = document.querySelectorAll(".tox .tox-menubar .tox-mbtn");
    if (!buttons.length) return;

    // Hide these menu headings for students
    const hideLabels = new Set(["Edit", "View", "Insert", "Tools", "Table", "Help"]);
    // If you want to also remove formatting menu, uncomment next line:
    // hideLabels.add("Format");

    buttons.forEach((btn) => {
      const label = (btn.textContent || "").trim();
      if (hideLabels.has(label)) btn.style.display = "none";
    });
  }

  // ---------- 5) Block paste + drop inside TinyMCE iframes ----------
  function guardIframe(iframe) {
    try {
      const doc = iframe.contentDocument;
      if (!doc || doc.__canstemGuarded) return;
      doc.__canstemGuarded = true;

      doc.addEventListener(
        "paste",
        function (e) {
          e.preventDefault();
          warnOnce("Pasting is disabled. Please type your own work.");
        },
        true
      );

      doc.addEventListener(
        "drop",
        function (e) {
          e.preventDefault();
          warnOnce("Drag & drop is disabled. Please type your own work.");
        },
        true
      );

      // Keep browser spellcheck ON (safe)
      if (doc.body) doc.body.setAttribute("spellcheck", "true");
    } catch (err) {}
  }

  function scan() {
    hideMenubarItems();

    // TinyMCE iframes
    const iframes = document.querySelectorAll('iframe.tox-edit-area__iframe, iframe[id^="tiny_"]');
    iframes.forEach(guardIframe);
  }

  // Run now + keep applying as content loads dynamically
  scan();
  const mo = new MutationObserver(scan);
  mo.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>
