<!-- ===== Good Friday Notice (CanSTEM Holiday Banner) ===== -->
<style>
  /* === Holiday banner styling for CanSTEM === */
  .holiday-notice {
    position: relative;
    display: block;
    text-align: center;
    padding: 8px;
    margin: 0 auto;
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    line-height: 2;
    border-radius: 40px;
    box-sizing: border-box;

    /* Good Friday theme gradient (deep purple + royal blue) */
    background: linear-gradient(90deg,
        #2b1b4f,
        #4a148c,
        #0d47a1,
        #1565c0);
    background-size: 300% 300%;
    animation: holiday-gradient-move 14s ease infinite;
    overflow: hidden;
  }

  /* Links inside banner */
  .holiday-notice a {
    text-decoration: underline;
  }

  /* Soft overlay (kept subtle, banner-only) */
  .holiday-notice::before,
  .holiday-notice::after {
    content: "";
    position: absolute;
    top: -150%;
    left: 0;
    width: 100%;
    height: 300%;
    pointer-events: none;
    background-image:
      radial-gradient(2px 2px at 10px 20px, rgba(255, 255, 255, 0.50) 70%, transparent 71%),
      radial-gradient(2px 2px at 80px 40px, rgba(255, 255, 255, 0.38) 70%, transparent 71%),
      radial-gradient(3px 3px at 50px 90px, rgba(255, 255, 255, 0.44) 70%, transparent 71%),
      radial-gradient(1.5px 1.5px at 120px 60px, rgba(255, 255, 255, 0.34) 70%, transparent 71%);
    background-size: 140px 140px;
    opacity: 0.35;
    animation: holiday-snow-fall 22s linear infinite;
  }

  .holiday-notice::after {
    background-size: 180px 180px;
    opacity: 0.22;
    animation-duration: 32s;
    animation-direction: reverse;
  }

  /* Gradient slow movement */
  @keyframes holiday-gradient-move {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Gentle drift (kept from your original) */
  @keyframes holiday-snow-fall {
    0% { transform: translate3d(0, -20px, 0); }
    100% { transform: translate3d(25px, 120px, 0); }
  }

  /* Tablet & mobile font size */
  @media (max-width: 1024px) {
    .holiday-notice {
      padding: 12px;
      font-size: 16px;
    }
  }
</style>

<div class="holiday-notice">
  The school will be closed on <strong>Friday, April 3, 2026</strong>, in observance of <strong>Good Friday</strong>.
  We will be open on <strong>Saturday, April 4, 2026</strong>, and <strong>Monday, April 6, 2026</strong>.
</div>
